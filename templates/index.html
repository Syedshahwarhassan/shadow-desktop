<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ assistant_name }} — JARVIS Web HUD</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="stylesheet" href="/static/css/hud.css">
</head>
<body data-theme="dark" style="--accent: {{ theme_color }};">

  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-name">{{ assistant_name }}</span>
      <span class="brand-tag">Web HUD</span>
    </div>
    <nav class="topbar-actions">
      <button id="micBtn" class="icon-btn" title="Toggle microphone (Space)">
        <span class="icon">🎙</span><span class="lbl">Listen</span>
      </button>
      <button id="muteBtn" class="icon-btn" title="Toggle voice output">
        <span class="icon">🔊</span><span class="lbl">Voice On</span>
      </button>
      <button id="themeBtn" class="icon-btn" title="Toggle theme">
        <span class="icon">🌗</span><span class="lbl">Theme</span>
      </button>
    </nav>
  </header>

  <main class="stage">
    <!-- LEFT: stats -->
    <aside class="panel panel-left">
      <h3 class="panel-title">System</h3>
      <div class="stat">
        <div class="stat-label">CPU</div>
        <div class="bar"><div id="cpuBar" class="bar-fill"></div></div>
        <div id="cpuTxt" class="stat-val">0%</div>
      </div>
      <div class="stat">
        <div class="stat-label">RAM</div>
        <div class="bar"><div id="ramBar" class="bar-fill"></div></div>
        <div id="ramTxt" class="stat-val">0%</div>
      </div>
      <div class="clock">
        <div id="clock" class="time">--:-- --</div>
        <div id="date" class="date">—</div>
      </div>

      <h3 class="panel-title">Memory</h3>
      <ul id="notesList" class="notes"></ul>
      <button id="clearNotes" class="ghost-btn">Clear memory</button>
    </aside>

    <!-- CENTER: HUD -->
    <section class="hud-wrap">
      <div id="hud" class="hud" data-state="idle">
        <svg viewBox="0 0 400 400" class="hud-svg">
          <defs>
            <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.9"/>
              <stop offset="60%" stop-color="var(--accent)" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
            </radialGradient>
            <filter id="glow"><feGaussianBlur stdDeviation="3.5" /></filter>
          </defs>

          <!-- Outer dotted ring -->
          <g class="ring ring-outer">
            <circle cx="200" cy="200" r="180" fill="none" stroke="var(--accent)" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="2 6"/>
          </g>
          <!-- Mid arc -->
          <g class="ring ring-mid">
            <circle cx="200" cy="200" r="150" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="40 18 8 22 60 30" stroke-opacity="0.85" filter="url(#glow)"/>
          </g>
          <!-- Inner thin ring -->
          <g class="ring ring-inner">
            <circle cx="200" cy="200" r="115" fill="none" stroke="var(--accent)" stroke-width="1" stroke-opacity="0.6"/>
          </g>
          <!-- Tick marks -->
          <g class="ticks" stroke="var(--accent)" stroke-opacity="0.55" stroke-width="2">
            <!-- generated by JS -->
          </g>
          <!-- Pulsing core -->
          <circle id="core" cx="200" cy="200" r="70" fill="url(#coreGrad)" />
          <!-- Voice waveform ring -->
          <circle id="waveRing" cx="200" cy="200" r="92" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-opacity="0" />
        </svg>

        <div class="hud-center">
          <div id="status" class="status">IDLE</div>
          <div id="hint" class="hint">Tap mic or say "{{ wake_word }}"</div>
        </div>
      </div>

      <div class="prompt-row">
        <input id="textInput" type="text" placeholder="Type a command…  (e.g. weather in Karachi)" autocomplete="off"/>
        <button id="sendBtn" class="primary-btn">Send</button>
      </div>

      <div class="quick">
        <button class="chip" data-cmd="what time is it">Time</button>
        <button class="chip" data-cmd="weather in Lahore">Weather</button>
        <button class="chip" data-cmd="tell me a joke">Joke</button>
        <button class="chip" data-cmd="give me a quote">Quote</button>
        <button class="chip" data-cmd="system info">Server stats</button>
        <button class="chip" data-cmd="tell me about the eiffel tower">Wiki: Eiffel Tower</button>
        <button class="chip" data-cmd="calculate 23 * 47 + 12">Calc</button>
        <button class="chip" data-cmd="convert 100 USD to PKR">Convert</button>
      </div>
    </section>

    <!-- RIGHT: history -->
    <aside class="panel panel-right">
      <div class="panel-head">
        <h3 class="panel-title">Conversation</h3>
        <button id="clearChat" class="ghost-btn small">Clear</button>
      </div>
      <div id="chat" class="chat"></div>
    </aside>
  </main>

  <footer class="bottombar">
    <span id="ttsStatus" class="status-pill">TTS: ready</span>
    <span id="srStatus" class="status-pill">Mic: idle</span>
    <span class="status-pill subtle">Press <kbd>Space</kbd> to talk · <kbd>Enter</kbd> to send</span>
  </footer>

  <script>
    window.__APP__ = {
      assistantName: {{ assistant_name|tojson }},
      wakeWord: {{ wake_word|tojson }}
    };
  </script>
  <script src="/static/js/hud.js"></script>
</body>
</html>
